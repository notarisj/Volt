<!-- Dashboard Switcher Modal -->
<dialog id="dashboardPanel" class="bg-slate-900 border border-white/10 rounded-2xl shadow-2xl shadow-black p-0 backdrop-blur-xl text-white w-full max-w-sm my-auto mx-auto translate-y-[-50px] transition-all open:translate-y-0 open:opacity-100 opacity-0 m-auto fixed inset-0 z-50">
    <div class="p-6">
        <div class="flex justify-between items-center mb-5">
            <h2 class="text-xl font-bold">Dashboards</h2>
            <button onclick="document.getElementById('dashboardPanel').close()" class="p-2 hover:bg-white/10 rounded-lg transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        </div>

        <!-- Dashboard list -->
        <div class="flex flex-col gap-2 mb-5">
            {{range .Dashboards}}
            <div class="flex items-center gap-2">
                {{if eq .ID $.CurrentID}}
                <!-- Active dashboard -->
                <div class="flex-1 flex items-center gap-2.5 px-3 py-2.5 rounded-xl bg-blue-600/20 border border-blue-500/30 text-white cursor-default">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-blue-400 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
                    </svg>
                    <span class="font-medium truncate text-sm">{{.Name}}</span>
                    <span class="ml-auto text-xs text-blue-400 font-medium shrink-0">Active</span>
                </div>
                {{else}}
                <!-- Inactive dashboard — click to switch -->
                <button hx-post="/dashboards/switch/{{.ID}}"
                        class="flex-1 flex items-center gap-2.5 px-3 py-2.5 rounded-xl bg-slate-800 hover:bg-slate-700 text-slate-300 hover:text-white text-left transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 shrink-0 opacity-50" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z" />
                    </svg>
                    <span class="font-medium truncate text-sm">{{.Name}}</span>
                </button>
                {{end}}

                <!-- Rename button -->
                <button type="button"
                        onclick="showDashboardRenameModal('{{.ID}}', '{{.Name}}')"
                        title="Rename dashboard"
                        class="p-2 rounded-lg text-slate-500 hover:text-blue-400 hover:bg-blue-500/10 transition-colors shrink-0">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
                    </svg>
                </button>

                <!-- Delete button — only shown when more than one dashboard exists -->
                {{if gt (len $.Dashboards) 1}}
                <button type="button"
                        onclick="showDashboardDeleteConfirm('{{.ID}}', '{{.Name}}')"
                        title="Delete dashboard"
                        class="p-2 rounded-lg text-slate-500 hover:text-red-400 hover:bg-red-500/10 transition-colors shrink-0">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                    </svg>
                </button>
                {{end}}
            </div>
            {{end}}
        </div>

        <!-- Create new dashboard -->
        <div class="border-t border-white/5 pt-5">
            <p class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">New Dashboard</p>
            <form id="createDashboardForm" hx-post="/dashboards" class="flex gap-2">
                <input type="text" name="name" placeholder="Dashboard name" maxlength="50" required
                    autocomplete="off"
                    class="flex-1 px-3 py-2 bg-slate-950/60 border border-white/5 rounded-xl text-white placeholder-slate-500 text-sm focus:outline-none focus:ring-0 focus:border-blue-500/40 transition-colors">
                <button type="submit"
                    class="px-4 py-2 bg-blue-600 hover:bg-blue-500 active:scale-95 text-white font-semibold rounded-xl text-sm transition-all whitespace-nowrap">
                    Create
                </button>
            </form>
        </div>
    </div>
</dialog>

<!-- Dashboard Rename Modal -->
<dialog id="dashboardRenameModal" class="bg-slate-900 border border-white/10 rounded-2xl shadow-2xl shadow-black p-0 backdrop-blur-xl text-white w-full max-w-sm my-auto mx-auto translate-y-[-50px] transition-all open:translate-y-0 open:opacity-100 opacity-0 m-auto fixed inset-0 z-[60]">
    <div class="p-6">
        <div class="flex justify-between items-center mb-5">
            <h2 class="text-xl font-bold">Rename Dashboard</h2>
            <button onclick="document.getElementById('dashboardRenameModal').close()" class="p-2 hover:bg-white/10 rounded-lg transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        </div>
        <form id="dashboardRenameForm" hx-target="#modals-container" hx-swap="innerHTML" class="flex flex-col gap-4">
            <input type="text" id="dashboardRenameInput" name="name" maxlength="50" required
                autocomplete="off"
                class="px-3 py-2.5 bg-slate-950/60 border border-white/5 rounded-xl text-white placeholder-slate-500 text-sm focus:outline-none focus:ring-0 focus:border-blue-500/40 transition-colors">
            <div class="flex gap-3">
                <button type="button" onclick="document.getElementById('dashboardRenameModal').close()"
                        class="flex-1 py-2.5 bg-slate-800 hover:bg-slate-700 active:scale-95 text-white font-medium rounded-xl transition-all border border-white/5">
                    Cancel
                </button>
                <button type="submit"
                        class="flex-1 py-2.5 bg-blue-600 hover:bg-blue-500 active:scale-95 text-white font-semibold rounded-xl transition-all">
                    Save
                </button>
            </div>
        </form>
    </div>
</dialog>

<!-- Dashboard Delete Confirmation Modal -->
<dialog id="dashboardDeleteModal" class="bg-slate-900 border border-white/10 rounded-2xl shadow-2xl shadow-black p-0 backdrop-blur-xl text-white w-full max-w-sm my-auto mx-auto translate-y-[-50px] transition-all open:translate-y-0 open:opacity-100 opacity-0 m-auto fixed inset-0 z-[60]">
    <div class="p-6">
        <div class="flex flex-col items-center text-center mb-6 pt-2">
            <div class="w-16 h-16 rounded-full bg-red-500/20 flex shrink-0 items-center justify-center mb-4 text-red-500 drop-shadow-[0_0_15px_rgba(239,68,68,0.3)]">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                </svg>
            </div>
            <h2 class="text-2xl font-bold mb-2">Delete Dashboard?</h2>
            <p class="text-slate-400">Delete <strong id="dashboardDeleteName" class="text-white"></strong> and all its apps? This action cannot be undone.</p>
        </div>
        <div class="flex gap-4">
            <button type="button" onclick="document.getElementById('dashboardDeleteModal').close()"
                    class="flex-1 py-3 bg-slate-800 hover:bg-slate-700 active:scale-95 text-white font-medium rounded-xl transition-all border border-white/5">
                Cancel
            </button>
            <button type="button" id="dashboardDeleteConfirmBtn"
                    class="flex-1 py-3 bg-red-600 hover:bg-red-500 active:scale-95 text-white font-bold rounded-xl transition-all shadow-lg shadow-red-500/20 border border-red-500/50">
                Delete
            </button>
        </div>
    </div>
</dialog>

<script>
    (function() {
        document.getElementById('dashboardPanel').showModal();

        window.showDashboardRenameModal = function(id, name) {
            var input = document.getElementById('dashboardRenameInput');
            input.value = name;
            var form = document.getElementById('dashboardRenameForm');
            form.setAttribute('hx-post', '/dashboards/' + id + '/rename');
            htmx.process(form);
            document.getElementById('dashboardRenameModal').showModal();
            input.focus();
            input.select();
        };

        window.showDashboardDeleteConfirm = function(id, name) {
            document.getElementById('dashboardDeleteName').textContent = name;
            var confirmBtn = document.getElementById('dashboardDeleteConfirmBtn');
            // Clone to drop any previous listener
            var fresh = confirmBtn.cloneNode(true);
            confirmBtn.parentNode.replaceChild(fresh, confirmBtn);
            fresh.addEventListener('click', function() {
                document.getElementById('dashboardDeleteModal').close();
                htmx.ajax('DELETE', '/dashboards/' + id, { target: '#modals-container', swap: 'innerHTML' });
            });
            document.getElementById('dashboardDeleteModal').showModal();
        };
    })();
</script>
